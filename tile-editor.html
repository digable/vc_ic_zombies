<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VC IC Zombies - Tile Editor</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/tile-debug.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Tile Editor</h1>
      <p class="subtitle">Edit subtiles and copy generated subTilesTemplate code. <a href="#newTileGenerator">Create New Tile</a> | <a href="index.html">Back to game</a></p>
    </header>

    <main class="tile-debug-page">
      <section class="panel tile-generator" id="newTileGenerator">
        <div class="board-header">
          <h3>New Tile Generator</h3>
        </div>
        <div class="tile-generator-grid">
          <label>Name <input id="newTileName" type="text" value="New Tile" /></label>
          <label>Type
            <select id="newTileType">
              <!-- populated dynamically from TILE_TYPE in constants.js -->
            </select>
          </label>
          <label>Zombie Spawn Mode
            <select id="newTileSpawnMode"></select>
          </label>
          <label>Zombie Count <input id="newTileZombieCount" type="number" min="0" value="0" /></label>
          <label>Zombie Type
            <select id="newTileZombieType"></select>
          </label>
          <label>Hearts (L) <input id="newTileHearts" type="number" min="0" value="0" /></label>
          <label>Bullets (B) <input id="newTileBullets" type="number" min="0" value="0" /></label>
        </div>

        <div class="tile-generator-section">
          <strong>Collections (count per collection)</strong>
          <div id="newTileCollectionInputs" class="tile-generator-collections"><!-- populated by JS --></div>
        </div>

        <div class="tile-generator-connectors">
          <strong>Connectors</strong>
          <label><input type="checkbox" id="newTileConnectorN" /> N</label>
          <label><input type="checkbox" id="newTileConnectorE" /> E</label>
          <label><input type="checkbox" id="newTileConnectorS" /> S</label>
          <label><input type="checkbox" id="newTileConnectorW" /> W</label>
        </div>

        <div class="tile-generator-section">
          <strong>Flags</strong>
          <div class="tile-generator-flags">
            <label><input type="checkbox" id="newTileIsStartTile" /> isStartTile</label>
            <label><input type="checkbox" id="newTileIsWinTile" /> isWinTile</label>
            <label><input type="checkbox" id="newTileFirstDrawWhenSolo" /> firstDrawWhenSolo</label>
          </div>
        </div>

        <div class="tile-generator-section">
          <strong>Zone Gateway Connector</strong>
          <select id="newTileZoneGateway">
            <option value="">— none —</option>
            <option value="N">N</option>
            <option value="E">E</option>
            <option value="S">S</option>
            <option value="W">W</option>
          </select>
        </div>

        <div class="tile-generator-section">
          <strong>Companion Tiles</strong>
          <div class="tile-generator-companions">
            <label>Companion Direction
              <select id="newTileCompanionDir">
                <option value="">— none —</option>
                <option value="N">N</option>
                <option value="E">E</option>
                <option value="S">S</option>
                <option value="W">W</option>
              </select>
            </label>
            <label>Companion Tile Names (comma-separated)
              <input id="newTileCompanionNames" type="text" placeholder="e.g. Straight, 4-Way" />
            </label>
          </div>
        </div>

        <div class="tile-generator-block">
          <strong>SubTiles</strong>
            <div id="newTileLivePreview" class="deck-tile tile-generator-preview"></div>
          <div id="newTileSubtileEditor"></div>
        </div>

        <div class="tile-generator-actions">
          <button id="copyNewTileCodeBtn" type="button">Copy Code</button>
          <span id="newTileCodeStatus" aria-live="polite"></span>
        </div>

        <pre id="newTileCodeOutput" class="tile-generator-output"></pre>
      </section>

      <section class="panel map-deck-debug-wrap">
        <div class="board-header map-deck-debug-header">
          <h3>Map Deck Debug</h3>
          <div id="mapDeckDebugCount"></div>
        </div>
        <div id="mapDeckDebug" class="deck-debug"></div>
      </section>
    </main>

    <script defer src="scripts/subtile-editor-row.js"></script>
    <script defer src="scripts/constants.js"></script>
    <script defer src="scripts/core.js"></script>
    <script defer src="scripts/data/map-tiles.js"></script>
    <script defer src="scripts/data/map-deck.js"></script>
    <script defer src="scripts/render/helpers.js"></script>
    <script defer src="scripts/render/compass-checkboxes.js"></script>
    <script defer src="scripts/render/debug.js"></script>
    <script defer src="scripts/tile-debug.js"></script>
  </body>
</html>
