<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VC IC Zombies</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>VC IC Zombies</h1>
      <p class="subtitle">Town square survival. Reach the helipad or collect 25 kills. <a href="tile-editor.html">Tile Editor</a></p>
    </header>

    <main class="layout">
      <section class="panel controls">
        <h2>Game Controls</h2>
        <div class="row">
          <label for="playerCount">Players</label>
          <input id="playerCount" type="number" min="1" max="4" value="2" />
        </div>
        <div class="setup-collection-grid">
          <span></span><span class="setup-col-header">Enabled</span><span class="setup-col-header">Disabled</span>
          <span class="setup-coll-name">Original</span>
          <input type="checkbox" data-deck-coll="original" data-deck-state="enabled" checked />
          <input type="checkbox" data-deck-coll="original" data-deck-state="disabled" />
          <span class="setup-coll-name">Iowa City</span>
          <input type="checkbox" data-deck-coll="iowa_city" data-deck-state="enabled" />
          <input type="checkbox" data-deck-coll="iowa_city" data-deck-state="disabled" />
          <span class="setup-coll-name">Not Used</span>
          <input type="checkbox" data-deck-coll="not_used" data-deck-state="enabled" />
          <input type="checkbox" data-deck-coll="not_used" data-deck-state="disabled" />
        </div>
        <div class="row">
          <button id="newGameBtn">New Game</button>
        </div>
        <div class="row">
          <button id="drawTileBtn">1. Draw & Place Tile</button>
          <button id="combatBtn">2. Combat Current Space</button>
          <button id="drawEventsBtn">3. Draw to 3 Events</button>
        </div>
        <div id="combatDecisionPanel" class="combat-decision hidden" aria-live="polite"></div>
        <div class="row">
          <span id="pendingTileInfo">Pending Tile: -</span>
        </div>
        <div class="row">
          <button id="rotateLeftBtn">Rotate ⟲</button>
          <button id="rotateRightBtn">Rotate ⟳</button>
        </div>
        <div class="row">
          <button id="rollMoveBtn">4. Roll Movement</button>
          <span id="moveRollOutput">Move Roll: -</span>
        </div>
        <div class="row dir-row">
          <button class="moveDirBtn" data-dir="N">Move ↑</button>
          <button class="moveDirBtn" data-dir="W">Move ←</button>
          <button class="moveDirBtn" data-dir="E">Move →</button>
          <button class="moveDirBtn" data-dir="S">Move ↓</button>
          <button id="endMoveBtn">End Movement</button>
        </div>
        <div class="row">
          <button id="moveZombiesBtn">5. Move Zombies</button>
          <span id="zombieRollOutput">Zombie Roll: -</span>
        </div>
        <div class="row">
          <button id="discardBtn">6. Discard Selected Event</button>
          <button id="endTurnBtn">End Turn</button>
        </div>
      </section>

      <section class="panel board-wrap">
        <div class="board-header">
          <h2>Map</h2>
          <div id="turnInfo"></div>
        </div>
        <div id="board"></div>
      </section>

      <section class="panel sidebar">
          <h2>Map Deck Info</h2>
          <div id="deckInfoBox"></div>
        <h2>Current Player</h2>
        <div id="currentPlayerCard"></div>

        <h2>Player Status</h2>
        <div id="playersList"></div>

        <h2>Event Hand</h2>
        <div id="handList"></div>

        <h2>Log</h2>
        <div id="log"></div>
      </section>
    </main>

    <script src="scripts/core.js"></script>
    <script src="scripts/data/map-deck.js"></script>
    <script src="scripts/data/event-cards/helpers.js"></script>
    <script src="scripts/data/event-cards/player-cards.js"></script>
    <script src="scripts/data/event-cards/opponent-cards.js"></script>
    <script src="scripts/data/event-cards/zombie-cards.js"></script>
    <script src="scripts/data/event-deck.js"></script>
    <script src="scripts/rules/placement.js"></script>
    <script src="scripts/rules/combat-flow.js"></script>
    <script src="scripts/rules/movement.js"></script>
    <script src="scripts/rules/zombie-ai.js"></script>
    <script src="scripts/rules/board-bounds.js"></script>
    <script src="scripts/actions/win.js"></script>
    <script src="scripts/actions/setup.js"></script>
    <script src="scripts/actions/combat.js"></script>
    <script src="scripts/actions/movement.js"></script>
    <script src="scripts/actions/zombies.js"></script>
    <script src="scripts/actions/events.js"></script>
    <script src="scripts/actions/turn-end.js"></script>
    <script src="scripts/render.js"></script>
    <script src="scripts/bootstrap.js"></script>
  </body>
</html>
